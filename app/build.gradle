apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply plugin: 'kotlin-kapt'

android {
    namespace 'com.retroemulator.launcher'
    compileSdk 34

    defaultConfig {
        applicationId "com.retroemulator.launcher"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        ndk {
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
        
        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
                cppFlags "-std=c++17 -O3 -fexceptions -frtti"
                abiFilters 'arm64-v8a', 'armeabi-v7a'
            }
        }
    }

    signingConfigs {
        release {
            storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['src/main/jniLibs', 'src/main/cpp/libs']
            assets.srcDirs = ['src/main/assets', 'games']
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        resources {
            excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/NOTICE']
        }
        exclude 'META-INF/INDEX.LIST'
        exclude 'META-INF/io.netty.versions.properties'
    }

    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}

dependencies {
    // AndroidX Core
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.fragment:fragment-ktx:1.6.2'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
    implementation 'androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0'
    
    // UI
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    
    // Coroutines
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
    
    // JSON
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'org.json:json:20231013'
    
    // Networking
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.12.0'
    
    // File operations
    implementation 'commons-io:commons-io:2.15.1'
    
    // ZIP support
    implementation 'net.lingala.zip4j:zip4j:2.11.5'
    
    // Image loading
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    kapt 'com.github.bumptech.glide:compiler:4.16.0'
    
    // Terminal/Console
    implementation 'com.termux:termux-shared:0.118.0'
    
    // Database (для сохранения настроек)
    implementation 'androidx.room:room-runtime:2.6.1'
    implementation 'androidx.room:room-ktx:2.6.1'
    kapt 'androidx.room:room-compiler:2.6.1'
    
    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
}

// Задача для копирования нативных библиотек
task copyNativeLibs(type: Copy) {
    from 'src/main/cpp/libs'
    into 'src/main/jniLibs'
    
    include '**/*.so'
}

// Задача для подготовки игр
task prepareGames(type: Copy) {
    from '../../games'
    into 'src/main/assets/games'
    
    include '**/*'
    exclude '**/template/**'
}

// Задача для генерации конфигов
task generateGameConfigs {
    doLast {
        def gamesDir = file('../../games')
        if (gamesDir.exists()) {
            gamesDir.eachDir { gameDir ->
                def configFile = new File(gameDir, 'game_config.json')
                if (!configFile.exists()) {
                    def config = """
                    {
                        "id": "${gameDir.name}",
                        "name": "${gameDir.name}",
                        "exe_name": "game.exe",
                        "use_dxvk": true,
                        "fullscreen": true,
                        "resolution": "1280x720"
                    }
                    """
                    configFile.text = config
                }
            }
        }
    }
}

// Подключаем задачи к сборке
preBuild.dependsOn copyNativeLibs
preBuild.dependsOn generateGameConfigs
tasks.whenTaskAdded { task ->
    if (task.name == 'mergeReleaseAssets') {
        task.dependsOn prepareGames
    }
    if (task.name == 'mergeDebugAssets') {
        task.dependsOn prepareGames
    }
}

// Конфигурация ProGuard
task proguardConfig {
    doLast {
        def proguardFile = file('proguard-rules.pro')
        if (!proguardFile.exists()) {
            proguardFile.text = """
            # Winlator specific
            -keep class com.winlator.** { *; }
            -keep class com.retroemulator.** { *; }
            
            # Native methods
            -keepclasseswithmembernames class * {
                native <methods>;
            }
            
            # Keep Wine/Box86 classes
            -keep class com.winlator.core.** { *; }
            -keep class com.winlator.wine.** { *; }
            -keep class com.winlator.xserver.** { *; }
            
            # AndroidX
            -keep class androidx.** { *; }
            
            # Gson
            -keepattributes Signature
            -keepattributes *Annotation*
            -keep class com.google.gson.** { *; }
            
            # OkHttp
            -dontwarn okhttp3.**
            -dontwarn okio.**
            """
        }
    }
}

// Оптимизация для release сборки
android.applicationVariants.all { variant ->
    if (variant.buildType.name == 'release') {
        variant.outputs.all { output ->
            output.outputFileName = "RetroEmulator-${variant.versionName}.apk"
        }
        
        // Добавляем задачу подписи APK
        tasks.create("sign${variant.name.capitalize()}Apk") {
            dependsOn variant.assemble
            doLast {
                def apkFile = variant.outputs.first().outputFile
                if (apkFile.exists()) {
                    exec {
                        commandLine 'jarsigner', '-verbose', '-sigalg', 'SHA1withRSA',
                                '-digestalg', 'SHA1', '-keystore',
                                "${System.getProperty('user.home')}/.android/debug.keystore",
                                '-storepass', 'android', apkFile.absolutePath, 'androiddebugkey'
                    }
                }
            }
        }
    }
}

// Увеличиваем память для сборки
gradle.projectsEvaluated {
    tasks.withType(JavaCompile) {
        options.compilerArgs << "-Xmx4g" << "-Xms2g"
    }
}

// Отключаем ненужные задачи для ускорения
tasks.whenTaskAdded { task ->
    if (task.name.contains("lint") || task.name.contains("test")) {
        task.enabled = false
    }
}
