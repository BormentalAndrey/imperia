name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias imperia \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass imperia123 \
            -keypass imperia123 \
            -dname "CN=Imperia, OU=Emulator, O=Imperia, L=City, ST=State, C=US"
      
      - name: Create signing config
        run: |
          mkdir -p app
          cat > app/keystore.properties << 'EOF'
          storeFile=../../release.keystore
          storePassword=imperia123
          keyAlias=imperia
          keyPassword=imperia123
          EOF
      
      - name: Grant execute permission
        run: chmod +x gradlew
      
      - name: Build release APK
        run: |
          ./gradlew assembleRelease
      
      - name: List APKs
        run: |
          find . -name "*.apk" -type f
          ls -la app/build/outputs/apk/release/
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Imperia-APK
          path: app/build/outputs/apk/release/*.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: "Imperia v${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
