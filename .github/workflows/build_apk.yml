name: Build Winlator APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create root build files
        run: |
          if [ ! -f settings.gradle ]; then
            cat > settings.gradle << 'EOF'
rootProject.name = "imperia"
include ':app'
project(':app').projectDir = new File('app/app')
EOF
          fi
          
          if [ ! -f build.gradle ]; then
            cat > build.gradle << 'EOF'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.2'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF
          fi
          
          echo "=== settings.gradle ==="
          cat settings.gradle
      
      - name: Grant permission
        run: chmod +x gradlew
      
      - name: Build debug APK
        run: ./gradlew assembleDebug
      
      - name: Find APK
        run: find . -name "*.apk" -type f
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Winlator-Debug-APK
          path: app/app/build/outputs/apk/debug/*.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/app/build/outputs/apk/debug/*.apk
          tag_name: v${{ github.run_number }}
          name: "Winlator Build v${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
