name: Full Reset - Clone Winlator Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-and-clone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: 1. Fetch Winlator Source ZIP
        run: |
          echo "=== Получаем последний релиз ==="
          curl -s https://api.github.com/repos/brunodev85/Winlator/releases/latest > release.json
          TAG=$(grep '"tag_name"' release.json | head -1 | cut -d'"' -f4)
          echo "Тег: $TAG"
          wget -O winlator.zip "https://github.com/brunodev85/Winlator/archive/refs/tags/${TAG}.zip"

      - name: 2. Extract archive
        run: |
          unzip -q winlator.zip
          ROOT_DIR=$(find . -maxdepth 1 -type d -iname "winlator-*" | head -1)
          ROOT_DIR=$(basename "$ROOT_DIR")
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: 3. Clear old Imperia code
        run: |
          find . -mindepth 1 -maxdepth 1 \
            -not -name '.git' \
            -not -name '.github' \
            -not -name "$ROOT_DIR" \
            -not -name 'winlator.zip' \
            -not -name 'release.json' \
            -exec rm -rf {} +

      - name: 4. Move Winlator to root
        run: |
          shopt -s dotglob
          mv "$ROOT_DIR"/* .
          rm -rf "$ROOT_DIR" winlator.zip release.json

      - name: 5. Fetch Modules (app, gladio, vortek)
        run: |
          rm -rf app gladio vortek
          git clone --depth 1 https://github.com/brunodev85/winlator-app app
          git clone --depth 1 https://github.com/brunodev85/gladio gladio
          git clone --depth 1 https://github.com/brunodev85/vortek vortek
          rm -rf app/.git gladio/.git vortek/.git

      - name: 6. Setup Gradle wrapper
        run: |
          # Скачиваем Gradle если не установлен
          if ! command -v gradle &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq wget unzip
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip
            sudo unzip -q gradle-8.4-bin.zip -d /opt
            sudo ln -s /opt/gradle-8.4/bin/gradle /usr/local/bin/gradle
          fi
          
          # Генерируем wrapper
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew
          
          echo "=== Проверка ==="
          ./gradlew --version

      - name: 7. Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🚀 Полное ядро Winlator + Gradle wrapper" || echo "Изменений нет"
          git push origin main
