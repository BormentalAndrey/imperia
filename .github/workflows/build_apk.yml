name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Generate Gradle Wrapper
        run: |
          # Проверяем, есть ли gradlew
          if [ ! -f "gradlew" ]; then
            echo "Генерируем Gradle wrapper..."
            
            # Устанавливаем Gradle
            sudo apt-get update
            sudo apt-get install -y wget unzip
            
            # Скачиваем Gradle 8.4
            wget https://services.gradle.org/distributions/gradle-8.4-bin.zip
            unzip gradle-8.4-bin.zip
            export PATH=$PATH:$(pwd)/gradle-8.4/bin
            
            # Генерируем wrapper в проекте
            cd app
            gradle wrapper --gradle-version 8.4
            cd ..
            
            # Копируем wrapper в корень
            cp -r app/gradle ./
            cp app/gradlew ./
            cp app/gradlew.bat ./
            chmod +x gradlew
          fi
      
      - name: Check Gradle wrapper
        run: |
          echo "=== Проверка файлов ==="
          ls -la gradlew
          ls -la gradle/wrapper/
          echo "=== Содержимое gradle-wrapper.properties ==="
          cat gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "Файл не найден"
      
      - name: Grant execute permission
        run: chmod +x gradlew
      
      - name: Build with Gradle
        run: ./gradlew assembleRelease --stacktrace
      
      - name: List APK files
        run: |
          echo "=== Поиск APK ==="
          find . -name "*.apk" -type f
      
      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RetroEmulator-APK
          path: app/build/outputs/apk/release/*.apk
      
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## 🎮 Retro PC Emulator
            
            ### Сборка от ${{ github.event.head_commit.timestamp }}
            
            **Особенности:**
            - Бесшовный запуск игр без меню
            - Поддержка DirectX через DXVK
            - Создание ярлыков на рабочем столе
            
            **Установка:**
            1. Скачайте APK
            2. Разрешите установку из неизвестных источников
            3. Установите и запустите
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
