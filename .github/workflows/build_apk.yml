name: Build Winlator APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Correct Multi-Module Build Files
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "imperia"
          include ':app', ':gladio', ':vortek'
          project(':app').projectDir = new File('app/app')
          project(':gladio').projectDir = new File('gladio')
          project(':vortek').projectDir = new File('vortek')
          EOF
          
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Patch Missing Namespaces for AGP 8.x
        run: |
          echo "=== Автоматическое исправление namespace для совместимости с AGP 8.x ==="
          
          patch_namespace() {
              local module_dir=$1
              local manifest="$module_dir/src/main/AndroidManifest.xml"
              local build_gradle="$module_dir/build.gradle"
              
              if [ -f "$manifest" ] && [ -f "$build_gradle" ]; then
                  # Вытаскиваем имя оригинального пакета из манифеста
                  local pkg=$(grep -o 'package="[^"]*"' "$manifest" | head -n 1 | cut -d'"' -f2)
                  
                  if [ ! -z "$pkg" ]; then
                      echo "Модуль [$module_dir]: найден пакет [$pkg]. Инжектируем namespace..."
                      # Вставляем строку namespace внутрь блока android {
                      sed -i -E "s/android[[:space:]]*\{/android {\n    namespace \"$pkg\"/" "$build_gradle"
                  else
                      echo "Модуль [$module_dir]: атрибут package не найден в манифесте."
                  fi
              else
                  echo "Модуль [$module_dir]: файлы конфигурации не найдены (возможно, это не Android-модуль)."
              fi
          }

          patch_namespace "app/app"
          patch_namespace "gladio"
          patch_namespace "vortek"

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew
      
      - name: Build Debug APK with Gradle
        run: ./gradlew :app:assembleDebug --stacktrace
      
      - name: Find Generated APK
        run: |
          echo "=== Поиск собранного APK ==="
          find . -name "*.apk" -type f
      
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Imperia-Winlator-Debug
          path: app/app/build/outputs/apk/debug/*.apk
      
      - name: Create GitHub Release
        if: success() && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: app/app/build/outputs/apk/debug/*.apk
          tag_name: v${{ github.run_number }}
          name: "Imperia Engine Build v${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
