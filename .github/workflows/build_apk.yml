name: Full Reset - Clone Winlator Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-and-clone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: 1. Fetch Winlator Source ZIP
        run: |
          echo "=== Получаем последний релиз ==="
          curl -s https://api.github.com/repos/brunodev85/Winlator/releases/latest > release.json
          TAG=$(grep '"tag_name"' release.json | head -1 | cut -d'"' -f4)
          echo "Тег: $TAG"
          wget -O winlator.zip "https://github.com/brunodev85/Winlator/archive/refs/tags/${TAG}.zip"

      - name: 2. Extract archive
        run: |
          unzip -q winlator.zip
          ROOT_DIR=$(find . -maxdepth 1 -type d -iname "winlator-*" | head -1)
          ROOT_DIR=$(basename "$ROOT_DIR")
          echo "ROOT_DIR=$ROOT_DIR" >> $GITHUB_ENV

      - name: 3. Backup Gradle wrapper files
        run: |
          mkdir -p /tmp/gradle-backup
          cp -r gradle /tmp/gradle-backup/ 2>/dev/null || true
          cp gradlew /tmp/gradle-backup/ 2>/dev/null || true
          cp gradlew.bat /tmp/gradle-backup/ 2>/dev/null || true
          cp gradle.properties /tmp/gradle-backup/ 2>/dev/null || true
          echo "Сохранено:"
          ls -la /tmp/gradle-backup/

      - name: 4. Clear old Imperia code
        run: |
          find . -mindepth 1 -maxdepth 1 \
            -not -name '.git' \
            -not -name '.github' \
            -not -name "$ROOT_DIR" \
            -not -name 'winlator.zip' \
            -not -name 'release.json' \
            -exec rm -rf {} +

      - name: 5. Move Winlator to root
        run: |
          shopt -s dotglob
          mv "$ROOT_DIR"/* .
          rm -rf "$ROOT_DIR" winlator.zip release.json

      - name: 6. Restore Gradle wrapper files
        run: |
          # Восстанавливаем gradlew если его нет
          if [ ! -f gradlew ]; then
            echo "Восстанавливаю gradlew..."
            cp /tmp/gradle-backup/gradlew . 2>/dev/null || true
            cp /tmp/gradle-backup/gradlew.bat . 2>/dev/null || true
            cp -r /tmp/gradle-backup/gradle . 2>/dev/null || true
            chmod +x gradlew 2>/dev/null || true
          fi
          
          # Восстанавливаем gradle.properties если нет
          if [ ! -f gradle.properties ]; then
            cp /tmp/gradle-backup/gradle.properties . 2>/dev/null || true
          fi
          
          echo "=== Проверка ==="
          ls -la gradlew gradle.properties 2>/dev/null
          ls -la gradle/wrapper/ 2>/dev/null

      - name: 7. Fetch Modules (app, gladio, vortek)
        run: |
          rm -rf app gladio vortek
          git clone --depth 1 https://github.com/brunodev85/winlator-app app
          git clone --depth 1 https://github.com/brunodev85/gladio gladio
          git clone --depth 1 https://github.com/brunodev85/vortek vortek
          rm -rf app/.git gladio/.git vortek/.git

      - name: 8. Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🚀 Полное ядро Winlator" || echo "Изменений нет"
          git push origin main
