name: Full Reset - Clone Winlator Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset-and-clone:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Winlator release source
        run: |
          # Скачиваем архив исходников Winlator 7.1.3
          wget -O winlator.zip "https://github.com/brunodev85/Winlator/archive/refs/tags/v7.1.3.zip"
          
          # Распаковываем
          unzip -q winlator.zip
          
          # Показываем что внутри
          ls -la
          ls -la Winlator-7.1.3/

      - name: Clone submodules
        run: |
          cd Winlator-7.1.3
          
          # Инициализируем подмодули
          git init
          git submodule add https://github.com/brunodev85/winlator-app app
          git submodule add https://github.com/brunodev85/gladio gladio
          git submodule add https://github.com/brunodev85/vortek vortek
          git submodule update --init --recursive
          
          # Удаляем .git из подмодулей (чтобы они стали обычными папками)
          rm -rf app/.git gladio/.git vortek/.git

      - name: Clear repository
        run: |
          # Удаляем ВСЁ из репозитория
          find . -mindepth 1 -not -path './.git/*' -not -name '.git' -not -path './Winlator-7.1.3/*' -delete
          
          # Перемещаем всё из Winlator-7.1.3 в корень
          shopt -s dotglob
          mv Winlator-7.1.3/* .
          rm -rf Winlator-7.1.3 winlator.zip

      - name: Setup Gradle wrapper
        run: |
          cd app
          gradle wrapper --gradle-version 8.4
          cd ..
          cp -r app/gradle .
          cp app/gradlew .
          cp app/gradlew.bat .
          chmod +x gradlew

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          git commit -m "🚀 Полный сброс: Winlator 7.1.3 с подмодулями"
          git push origin main --force
