name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias imperia \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass imperia123 \
            -keypass imperia123 \
            -dname "CN=Imperia, OU=Emulator, O=Imperia, L=City, ST=State, C=US"
          
          echo "=== Проверка keystore ==="
          ls -la release.keystore
          echo "=== Текущая папка ==="
          pwd
      
      - name: Setup Gradle wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          chmod +x gradlew
      
      - name: Build release APK
        run: |
          echo "=== Содержимое корня ==="
          ls -la
          echo "=== Запуск сборки ==="
          ./gradlew assembleRelease --stacktrace
      
      - name: Check APK
        run: |
          echo "=== Поиск APK ==="
          find . -name "*.apk" -type f
          echo "=== Проверка подписи ==="
          for apk in $(find . -name "*.apk" -type f); do
            echo "APK: $apk"
            jarsigner -verify -verbose "$apk" || echo "Проверка не удалась"
          done
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Imperia-APK
          path: app/build/outputs/apk/release/*.apk
      
      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: "Imperia v${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
