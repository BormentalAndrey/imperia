name: Explore Winlator Source

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Winlator
        run: |
          git clone --depth 1 https://github.com/brunodev85/Winlator.git /tmp/win
          
          echo "=== Корень ==="
          ls -la /tmp/win/
          
          echo ""
          echo "=== app/ ==="
          ls -la /tmp/win/app/ 2>/dev/null || echo "Нет app/"
          
          echo ""
          echo "=== Все папки с кодом ==="
          find /tmp/win -type d -name "java" -o -name "kotlin" -o -name "src" | head -20
          
          echo ""
          echo "=== Все .kt/.java файлы ==="
          find /tmp/win -name "*.kt" -o -name "*.java" | head -20
