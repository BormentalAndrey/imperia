name: Fetch and Commit Winlator Core Files

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  fetch-winlator-files:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Клонирование вашего репозитория (Imperia)
        uses: actions/checkout@v4

      - name: 2. Клонирование оригинального репозитория Winlator
        run: |
          echo "Скачиваем исходники Winlator..."
          git clone --depth 1 https://github.com/brunodev85/winlator.git /tmp/winlator

      - name: 3. Создание нужной структуры папок в Imperia
        run: |
          mkdir -p app/src/main/java/com/winlator/core
          mkdir -p app/src/main/java/com/winlator/xserver

      - name: 4. Умный поиск и копирование файлов
        run: |
          echo "Ищем фактическое расположение папок в Winlator..."
          
          # Динамический поиск папок core и xserver
          CORE_DIR=$(find /tmp/winlator -type d -path "*/com/winlator/core" | head -n 1)
          XSERVER_DIR=$(find /tmp/winlator -type d -path "*/com/winlator/xserver" | head -n 1)
          
          echo "Найден путь к core: $CORE_DIR"
          echo "Найден путь к xserver: $XSERVER_DIR"
          
          # Копируем содержимое найденных папок (используем /. для надежного копирования всех файлов)
          if [ -n "$CORE_DIR" ]; then
            cp -R "$CORE_DIR"/. app/src/main/java/com/winlator/core/
            echo "✅ Файлы core успешно скопированы."
          else
            echo "❌ Папка core не найдена! Вывожу структуру для отладки:"
            find /tmp/winlator -type d -name "*winlator*"
          fi
          
          if [ -n "$XSERVER_DIR" ]; then
            cp -R "$XSERVER_DIR"/. app/src/main/java/com/winlator/xserver/
            echo "✅ Файлы xserver успешно скопированы."
          else
            echo "❌ Папка xserver не найдена!"
          fi

      - name: 5. Настройка Git и автоматический Коммит
        run: |
          echo "Настраиваем Git бота..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add app/src/main/java/com/winlator/core/
          git add app/src/main/java/com/winlator/xserver/
          
          if git diff-index --quiet HEAD --; then
            echo "🤷 Изменений нет, все файлы уже на месте или ничего не скопировано."
          else
            echo "📦 Коммитим новые файлы ядра!"
            git commit -m "🤖 Умный перенос файлов ядра Winlator (core, xserver)"
            git push
          fi
