name: Find Winlator Source Code

on:
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - name: Try winlator-android
        run: |
          git clone --depth 1 https://github.com/brunodev85/winlator-android.git /tmp/w
          
          echo "=== Структура ==="
          ls -la /tmp/w/
          
          echo ""
          echo "=== Ищем код ==="
          find /tmp/w -name "*.kt" -o -name "*.java" | head -10
          
          echo ""
          echo "=== Ищем .so ==="
          find /tmp/w -name "*.so" | head -5
