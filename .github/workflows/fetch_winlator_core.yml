name: Extract Winlator Source with Submodules

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout imperia
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Winlator with submodules
        run: |
          git clone --recursive --depth 1 https://github.com/brunodev85/Winlator.git /tmp/win
          
          echo "=== Все .kt/.java файлы ==="
          find /tmp/win -name "*.kt" -o -name "*.java" | head -30
          
          echo ""
          echo "=== Папки с кодом ==="
          find /tmp/win -type d -name "src" | head -10
          
          echo ""
          echo "=== .so файлы ==="
          find /tmp/win -name "*.so" | head -10

      - name: Copy Java source code
        run: |
          # Ищем и копируем все Java/Kotlin файлы
          SOURCE_DIR=$(find /tmp/win -type d -path "*/main/java" | head -1)
          
          if [ -n "$SOURCE_DIR" ]; then
            echo "Найден исходный код в: $SOURCE_DIR"
            cp -r "$SOURCE_DIR"/* app/src/main/java/
            echo "Скопировано файлов:"
            find app/src/main/java -type f | wc -l
          else
            echo "Исходный код не найден"
          fi

      - name: Copy native libraries
        run: |
          mkdir -p app/src/main/jniLibs
          
          # Ищем .so файлы
          find /tmp/win -name "*.so" | while read lib; do
            if echo "$lib" | grep -q "arm64"; then
              mkdir -p app/src/main/jniLibs/arm64-v8a
              cp "$lib" app/src/main/jniLibs/arm64-v8a/
            elif echo "$lib" | grep -q "armv7\|armeabi"; then
              mkdir -p app/src/main/jniLibs/armeabi-v7a
              cp "$lib" app/src/main/jniLibs/armeabi-v7a/
            fi
          done
          
          echo "Библиотеки:"
          find app/src/main/jniLibs -name "*.so"

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add app/src/main/java/ app/src/main/jniLibs/
          
          if git diff --staged --quiet; then
            echo "Нет изменений"
          else
            git commit -m "🤖 Исходники Winlator с подмодулями"
            git push origin main
          fi
