name: Fix Duplicate Resources

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove duplicate resources
        run: |
          # Удаляем наши старые иконки (оставляем от Winlator)
          rm -f app/src/main/res/mipmap-hdpi/ic_launcher.png 2>/dev/null
          rm -f app/src/main/res/mipmap-hdpi/ic_launcher.xml 2>/dev/null
          rm -f app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null
          rm -f app/src/main/res/drawable/ic_launcher_foreground.xml 2>/dev/null
          rm -f app/src/main/res/values/ic_launcher_background.xml 2>/dev/null
          
          # Удаляем дубликат цвета если есть
          rm -f app/src/main/res/values/colors.xml 2>/dev/null
          
          # Удаляем наши старые строки (оставляем от Winlator)
          rm -f app/src/main/res/values/strings.xml 2>/dev/null
          
          # Удаляем наши старые темы
          rm -f app/src/main/res/values/themes.xml 2>/dev/null
          
          echo "=== Оставшиеся ресурсы ==="
          find app/src/main/res -type f | sort

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if git diff --staged --quiet; then
            echo "Нет изменений"
          else
            git commit -m "🤖 Удалены дубликаты ресурсов"
            git push origin main
          fi
