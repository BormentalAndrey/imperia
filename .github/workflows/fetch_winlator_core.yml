name: Explore Winlator Structure

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Winlator
        run: |
          git clone --depth 1 https://github.com/brunodev85/winlator.git /tmp/winlator
          
          echo "=== Структура папок ==="
          find /tmp/winlator -type d | head -50
          
          echo ""
          echo "=== Java/Kotlin файлы ==="
          find /tmp/winlator -name "*.kt" -o -name "*.java" | head -30
          
          echo ""
          echo "=== .so файлы ==="
          find /tmp/winlator -name "*.so" | head -20
          
          echo ""
          echo "=== app/src структура ==="
          find /tmp/winlator/app/src -type d 2>/dev/null | head -30
