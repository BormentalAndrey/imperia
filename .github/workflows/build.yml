name: Build Winlator APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную по кнопке

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Скачиваем код вместе со всеми зависимостями

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Winlator использует современные версии Gradle, нужен JDK 17
          distribution: 'zulu'
          cache: gradle # Кэшируем Gradle, чтобы следующие сборки шли быстрее

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK (Debug)
        # Собираем дебаг-версию, так как для Release нужны ключи подписи (Keystore)
        run: ./gradlew assembleDebug 

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-app-debug
          # Стандартный путь, куда Android Studio складывает готовые APK
          path: app/build/outputs/apk/debug/*.apk
